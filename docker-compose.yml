services:
  db_mongo:
    build:
      context: ./mongo
    restart: on-failure:3
    env_file:
      - .env
    environment:
      MONGODB_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGODB_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - ./mongo/init.js:/docker-entrypoint-initdb.d/init.js:ro
      - mongo_data:/data/db
    networks:
      - private
    healthcheck:
      test:
        ["CMD-SHELL", "mongosh --quiet --host 127.0.0.1 --port 27017 -u $$MONGODB_INITDB_ROOT_USERNAME -p $$MONGODB_INITDB_ROOT_PASSWORD --authenticationDatabase admin --eval \"const blogDb = db.getSiblingDB('blog_db'); const count = blogDb.posts.countDocuments(); if (count === 5) { quit(0); } quit(1);\"",]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
      start_interval: 40s

  db_mysql:
    image: mysql:9.6
    restart: on-failure:3
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    volumes:
      - ./sqlfiles:/docker-entrypoint-initdb.d:ro
      - mysql_data:/var/lib/mysql
    networks:
      - private
    healthcheck:
      test:
        ["CMD-SHELL", "[ \"$(mysql -h 127.0.0.1 -P 3306 -uroot -p$$MYSQL_ROOT_PASSWORD -D $$MYSQL_DATABASE -Nse \"SELECT COUNT(*) FROM utilisateurs;\")\" = \"4\" ]",]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
      start_interval: 40s

  admin_mongo:
    image: mongo-express
    restart: on-failure:3
    depends_on:
      db_mongo:
        condition: service_healthy
    ports:
      - "${ADMIN_MONGO_PORT}:8081"
    env_file:
      - .env
    environment:
      ME_CONFIG_MONGODB_URL: ${MONGO_EXPRESS_URL}
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_EXPRESS_USERNAME}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_EXPRESS_PASSWORD}
    networks:
      - public
      - private
    healthcheck:
      test:
        ["CMD", "node", "-e", "const http = require('http'); const auth = process.env.ME_CONFIG_BASICAUTH_USERNAME + ':' + process.env.ME_CONFIG_BASICAUTH_PASSWORD; http.get({ hostname: '127.0.0.1', port: 8081, auth }, res => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1));",]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  admin_mysql:
    image: adminer
    restart: on-failure:3
    depends_on:
      db_mysql:
        condition: service_healthy
    ports:
      - "${ADMIN_MYSQL_PORT}:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db_mysql
    networks:
      - public
      - private
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8080/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  api:
    build:
      context: ./api
    restart: on-failure:3
    depends_on:
      db_mongo:
        condition: service_healthy
      db_mysql:
        condition: service_healthy
    env_file:
      - .env
    environment:
      MYSQL_URL: ${MYSQL_URL}
      MONGO_URI: ${MONGO_URI}
    ports:
      - "${API_PORT}:8000"
    networks:
      - public
      - private
    healthcheck:
      test:
        - CMD
        - bash
        - -lc
        - |
          check() {
            exec 3<>/dev/tcp/127.0.0.1/8000 || return 1
            printf 'GET %s HTTP/1.1\r\nHost: 127.0.0.1\r\nConnection: close\r\n\r\n' "$1" >&3
            tr -d '\n' <&3 | grep -q "$2"
          }

          check "/posts" 'HTTP/1.1 200.*"posts":\[.*"count":5' &&
          check "/users" 'HTTP/1.1 200.*"users":\[.*"count":4'
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

networks:
  public:
  private:
    internal: true

volumes:
  mongo_data:
  mysql_data:
