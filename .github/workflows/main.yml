name: Build and Test Application

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build_test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for server
        run: docker build -t devops-term-server:1.0.0 -f ./server/Dockerfile .

      - name: Build image for mongo
        run: docker build -t devops-term-mongo:1.0.0 -f ./mongo/Dockerfile .

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Docker scout scan for server
        uses: docker/scout-action@v1
        with:
          command: cves,recommendations
          image: devops-term-server:1.0.0
          file: ./server/Dockerfile
          only-severities: CRITICAL,HIGH
          exit-code: false

      - name: Docker scout scan for mongo
        uses: docker/build-push-action@v1
        with:
          command: cves,recommendations
          image: devops-term-server:1.0.0
          file: ./mongo/Dockerfile
          only-severities: CRITICAL,HIGH
          exit-code: false

  docker-compose: 
    needs: build_test
    runs-on: ubuntu-latest
    steps: 
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Build the slack
        run: docker compose up -d